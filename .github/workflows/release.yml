name: Repackage and release

# Watches Anthropic's official apt repo and, when a new Claude Desktop version
# appears, repackages the official .deb into RPM / deb / tarball / AppImage / Arch
# and publishes a GitHub Release (the Nix flake tracks it via a bump PR). Applies
# a few small Linux patches to the app.asar, otherwise a faithful repackage.
on:
  schedule:
    - cron: '17 */3 * * *'   # every 3 hours
  workflow_dispatch:
    inputs:
      force:
        description: 'Build even if the version is unchanged'
        type: boolean
        default: false

permissions:
  contents: write        # create releases; push the nix-bump branch (never main)
  issues: write          # open/update an issue when the workflow fails
  pull-requests: write   # open the Nix-pin bump PR on a new upstream version
  actions: write         # delete this run's build artifacts once they're on the release

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.d.outputs.version }}
      pkgrel: ${{ steps.d.outputs.pkgrel }}
      fullver: ${{ steps.d.outputs.fullver }}
      should_release: ${{ steps.d.outputs.should_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: d
        env:
          FORCE: ${{ inputs.force }}
          GH_TOKEN: ${{ github.token }}
        run: |
          eval "$(bash scripts/detect-version.sh amd64)"
          # Defense in depth: version is used in shell/tag context later.
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+(\.[0-9]+)*$'; then
            echo "Refusing unexpected version string: $VERSION" >&2
            exit 1
          fi

          # Packaging revision (pkgrel), derived from the published releases, no
          # committed state. Highest existing v<version>-<N>:
          esc="$(printf '%s' "$VERSION" | sed 's/[.]/\\./g')"
          maxrel="$(gh release list -R "$GITHUB_REPOSITORY" -L 1000 --json tagName -q '.[].tagName' 2>/dev/null \
                    | grep -E "^v${esc}-[0-9]+$" | sed -E "s/^v${esc}-//" | sort -n | tail -1)"

          if [ -z "$maxrel" ]; then
            # Never released this upstream version -> first packaging, -0.
            PKGREL=0; SHOULD=true
          elif [ "$FORCE" = "true" ]; then
            # A fix rebuild for the same upstream version -> next revision.
            PKGREL=$((maxrel + 1)); SHOULD=true
          else
            # Already released and nothing forced -> nothing to do.
            PKGREL="$maxrel"; SHOULD=false
          fi
          FULLVER="$VERSION-$PKGREL"

          echo "Upstream $VERSION, highest published pkgrel: ${maxrel:-none} -> building v$FULLVER = $SHOULD"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$PKGREL" >> "$GITHUB_OUTPUT"
          echo "fullver=$FULLVER" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD" >> "$GITHUB_OUTPUT"

  # Fetch + verify + patch the official .deb once per arch. Uploaded as a
  # short-lived artifact so the format jobs below can build in parallel off the
  # same patched payload instead of each re-fetching + re-patching it.
  fetch:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
      - name: Install patch tooling (@electron/asar)
        run: npm ci
      - name: Install fetch tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binutils xz-utils curl
      - name: Fetch + verify + patch the official .deb
        run: bash scripts/fetch-deb.sh "${{ matrix.arch }}" payload
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: payload-${{ matrix.arch }}
          path: payload
          retention-days: 1   # only needed by the format jobs moments later; the
                               # release job deletes it explicitly once done too.

  # rpm/tarball/appimage/deb, one job per (arch, format) combination, all running
  # in parallel instead of the old single job building all four sequentially.
  build-format:
    needs: [detect, fetch]   # detect listed directly: needs.detect.outputs.* below
                             # is only visible to jobs that depend on it directly.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            format: rpm
            packages: rpm
          - arch: amd64
            format: deb
            packages: dpkg binutils xz-utils
          - arch: amd64
            format: tarball
            packages: ""
          - arch: amd64
            format: appimage
            packages: curl zsync
          - arch: arm64
            format: rpm
            packages: rpm
          - arch: arm64
            format: deb
            packages: dpkg binutils xz-utils
          - arch: arm64
            format: tarball
            packages: ""
          - arch: arm64
            format: appimage
            packages: curl zsync
    env:
      PKGREL: ${{ needs.detect.outputs.pkgrel }}
      APPIMAGE_EXTRACT_AND_RUN: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install build tooling
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ${{ matrix.packages }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: payload-${{ matrix.arch }}
          path: payload
      - name: Build ${{ matrix.format }} (${{ matrix.arch }})
        env:
          PAYLOAD_DIR: ${{ github.workspace }}/payload
        run: bash "scripts/build-${{ matrix.format }}.sh" "${{ matrix.arch }}" dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.arch }}-${{ matrix.format }}
          path: dist/*
          retention-days: 1

  # Arch .pkg.tar.zst via makepkg in an archlinux container, reusing the tarball
  # build-format already produced (aarch64 built on this x86 runner via CARCH
  # override, no qemu). Depends on the whole build-format matrix (job-level
  # "needs" can't target a single matrix leg), not just the tarball legs.
  build-arch-pkg:
    needs: [detect, build-format]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    env:
      PKGREL: ${{ needs.detect.outputs.pkgrel }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ matrix.arch }}-tarball
          path: dist
      - name: Compute weekly cache bucket
        id: cachekey
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"
      - name: Cache pacman packages (archlinux base-devel)
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: pacman-cache
          key: pacman-${{ matrix.arch }}-${{ steps.cachekey.outputs.week }}
      - name: Cache archlinux base image
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: archlinux-image-cache
          # Same base image regardless of target arch (CARCH is overridden
          # inside the container, no qemu) - one shared key, not per matrix.arch.
          key: archlinux-image-${{ steps.cachekey.outputs.week }}
      - name: Load or pull the archlinux base image
        # Only the pacman *packages* installed inside the container were cached
        # before; the base image layers themselves were still pulled from Docker
        # Hub on every run. Load it from the cache above when present, else pull
        # once and save it so this week's later runs load instead of pulling.
        run: |
          mkdir -p archlinux-image-cache
          if [ -f archlinux-image-cache/archlinux.tar ]; then
            docker load -i archlinux-image-cache/archlinux.tar
            echo "build-arch: loaded archlinux:latest from cache"
          else
            docker pull archlinux:latest
            docker save archlinux:latest -o archlinux-image-cache/archlinux.tar
            echo "build-arch: pulled archlinux:latest and cached it"
          fi
      - name: Build Arch package
        env:
          PACMAN_CACHE_DIR: ${{ github.workspace }}/pacman-cache
        run: bash scripts/build-arch.sh "${{ matrix.arch }}" dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.arch }}-arch
          path: dist/*.pkg.tar.zst
          retention-days: 1

  release:
    needs: [detect, build-format, build-arch-pkg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history + tags, for the grouped changelog
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*        # not payload-*: that still holds the unpatched
          path: artifacts         # upstream claude.deb, which must never land in dist/
          merge-multiple: true
      - name: Install signing / repo tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rpm gnupg createrepo-c dpkg-dev apt-utils
      - name: Collect assets
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.tar.gz' -o -name '*.AppImage' -o -name '*.zsync' -o -name '*.pkg.tar.zst' \) -exec cp -v {} dist/ \;
          ls -lh dist
      - name: Render Arch PKGBUILD (for makepkg users)
        env:
          V: ${{ needs.detect.outputs.version }}
          PKGREL: ${{ needs.detect.outputs.pkgrel }}
        run: |
          bash scripts/render-pkgbuild.sh "$V" "$PKGREL" "$GITHUB_REPOSITORY" dist > dist/PKGBUILD
          cp packaging/arch/claude-desktop-repack.install dist/
      - name: Sign artifacts (RPM + SHA256SUMS)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash scripts/sign-artifacts.sh dist
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ needs.detect.outputs.version }}
          FULLVER: ${{ needs.detect.outputs.fullver }}
        run: |
          # Notes = rendered template (version + patch list) followed by a grouped
          # changelog of our commits since the previous release.
          node scripts/render-notes.mjs "$V" "$GITHUB_REPOSITORY" > NOTES.md
          PREV="$(gh release list -R "$GITHUB_REPOSITORY" -L 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)"
          RANGE=""; [ -n "$PREV" ] && RANGE="$PREV..HEAD"
          { echo; node scripts/changelog.mjs "$RANGE"; } >> NOTES.md
          gh release create "v$FULLVER" dist/* --title "Claude Desktop $FULLVER" --notes-file NOTES.md \
            || { gh release edit "v$FULLVER" --title "Claude Desktop $FULLVER" --notes-file NOTES.md; \
                 gh release upload "v$FULLVER" dist/* --clobber; }
      - name: Build Pages site (dnf install repo + landing)
        env:
          V: ${{ needs.detect.outputs.version }}
          PKGREL: ${{ needs.detect.outputs.pkgrel }}
        run: |
          # sign-artifacts.sh already imported the GPG key; grab its id so the dnf
          # repo metadata is signed too (empty if no key -> unsigned repo).
          export GPG_KEY_ID="$(gpg --list-secret-keys --with-colons | awk -F: '$1=="fpr"{print $10; exit}')"
          bash scripts/build-pages-site.sh dist "$V" "$PKGREL" "$GITHUB_REPOSITORY" site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
      - name: Delete build artifacts (now published on the release)
        # The dist-* artifacts were only needed to hand files from build-format /
        # build-arch-pkg to this job, and payload-* only to hand the fetched
        # payload from fetch to the format jobs. Both are on the GitHub Release
        # (dist-*) or fully consumed (payload-*) by now, so drop the workflow
        # artifacts immediately instead of waiting out retention-days.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # dist-* and payload-* only; keep the github-pages artifact for deploy.
          for id in $(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
                      -q '.artifacts[] | select(.name|startswith("dist-") or startswith("payload-")) | .id'); do
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/actions/artifacts/$id" && echo "deleted artifact $id"
          done
      - name: Bump Nix flake pin (release-coupled)
        # The Nix flake fetches this repo's release tarball, so its pin (version +
        # pkgrel + per-arch tarball sha256) must track every release - each -N
        # ships a different tarball. Open a PR bumping it (main is protected, so a
        # PR, not a direct push) and arm auto-merge.
        #
        # Uses NIX_BUMP_TOKEN (a PAT) if set, else GITHUB_TOKEN. Auto-merge only
        # COMPLETES with the PAT: a PR opened by GITHUB_TOKEN does not trigger the
        # required `gitleaks` check, so it would sit pending forever.
        env:
          GH_TOKEN: ${{ secrets.NIX_BUMP_TOKEN || github.token }}
          V: ${{ needs.detect.outputs.version }}
          PKGREL: ${{ needs.detect.outputs.pkgrel }}
        run: bash scripts/bump-nix-pin.sh "$V" "$PKGREL" dist

  notify-failure:
    needs: [detect, fetch, build-format, build-arch-pkg, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Open or update an issue with the failure log
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          # Collect the logs of the jobs that failed (each completed job's log is
          # available via the API even while this notify job is still running).
          : > failed.log
          gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            -q '.jobs[] | select(.conclusion=="failure") | "\(.id) \(.name)"' \
          | while read -r jid jname; do
              [ -z "$jid" ] && continue
              echo "===== $jname =====" >> failed.log
              gh api "repos/$REPO/actions/jobs/$jid/logs" >> failed.log 2>/dev/null \
                || echo "(log unavailable; see the run)" >> failed.log
              echo >> failed.log
            done
          tail -n 200 failed.log | sed 's/\r$//' > excerpt.log
          logblock() {
            echo "<details><summary>Failed job log (last 200 lines)</summary>"
            echo; echo '```'; cat excerpt.log; echo '```'; echo; echo "</details>"
          }

          # patch-payload prints "PATCH-FAILURE version=<v> failed=<list>" when a
          # patch no longer matches upstream. Open one issue per version naming
          # the failing patches.
          patchline=$(grep -aoE 'PATCH-FAILURE version=[0-9.]+ failed=[A-Za-z0-9,_-]+' failed.log | head -1 || true)
          if [ -n "$patchline" ]; then
            pv=${patchline#*version=}; pv=${pv%% *}
            pf=${patchline#*failed=}; pf=${pf%% *}
            title="Patch validation failed: Claude Desktop $pv"
            {
              echo "The GNOME-Wayland patches did not apply cleanly to **Claude Desktop $pv** (upstream likely changed the minified code)."
              echo
              echo "- Failing patch(es): \`$pf\`"
              echo "- Run: $RUN_URL"
              echo
              logblock
            } > body.md
            gh label create patch-failure -R "$REPO" --color 5319E7 \
              --description "A GNOME-Wayland patch no longer applies" 2>/dev/null || true
            existing=$(gh issue list -R "$REPO" --state open --label patch-failure \
              --json number,title -q "[.[]|select(.title==\"$title\")][0].number" 2>/dev/null || true)
            if [ -n "$existing" ]; then
              gh issue comment "$existing" -R "$REPO" --body-file body.md
            else
              gh issue create -R "$REPO" --title "$title" --label patch-failure --body-file body.md
            fi
            exit 0
          fi

          # check-native-paths prints "NATIVE-PATH-DRIFT version=<v> paths=<list>"
          # when upstream introduces new, unreviewed absolute system paths that may
          # be Debian-specific (cross-distro breakage). One issue per version.
          driftline=$(grep -aoE 'NATIVE-PATH-DRIFT version=[0-9.]+ paths=[A-Za-z0-9,._/*+-]+' failed.log | head -1 || true)
          if [ -n "$driftline" ]; then
            dv=${driftline#*version=}; dv=${dv%% *}
            dp=${driftline#*paths=}; dp=${dp%% *}
            title="Unreviewed system paths: Claude Desktop $dv"
            {
              echo "New absolute system path(s) appeared in **Claude Desktop $dv** that are not in the reviewed allowlist (\`baseline/system-paths.json\`). Some may be Debian-specific and break non-Debian distros (Fedora/RHEL/Arch), like the OVMF firmware paths \`cowork-firmware-paths\` fixes."
              echo
              echo "- New path(s): \`$dp\`"
              echo "- Run: $RUN_URL"
              echo
              echo "Review each, then either allowlist the benign ones (\`node scripts/check-native-paths.mjs <payloadDir> --update\`, then review the diff) or write a patch for the Debian-specific ones (see \`patches/cowork-firmware-paths.mjs\`)."
              echo
              logblock
            } > body.md
            gh label create path-drift -R "$REPO" --color FBCA04 \
              --description "New unreviewed absolute system path in the upstream bundle" 2>/dev/null || true
            existing=$(gh issue list -R "$REPO" --state open --label path-drift \
              --json number,title -q "[.[]|select(.title==\"$title\")][0].number" 2>/dev/null || true)
            if [ -n "$existing" ]; then
              gh issue comment "$existing" -R "$REPO" --body-file body.md
            else
              gh issue create -R "$REPO" --title "$title" --label path-drift --body-file body.md
            fi
            exit 0
          fi

          # Generic workflow failure (not a patch mismatch): one reused issue.
          {
            echo "The **Repackage and release** workflow failed."
            echo
            echo "- Run: $RUN_URL"
            echo "- Commit: \`$SHA\`"
            echo
            logblock
          } > body.md
          gh label create ci-failure -R "$REPO" --color B60205 \
            --description "Automated release workflow failure" 2>/dev/null || true
          existing=$(gh issue list -R "$REPO" --state open --label ci-failure \
            --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" -R "$REPO" --body-file body.md
          else
            gh issue create -R "$REPO" --title "CI failure: release workflow" \
              --label ci-failure --body-file body.md
          fi

  # Publish the install-repo metadata + landing page to GitHub Pages (the site
  # artifact was uploaded by the release job). Packages stay on the release.
  deploy-pages:
    needs: [detect, release]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

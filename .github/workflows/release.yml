name: Repackage and release

# Watches Anthropic's official apt repo and, when a new Claude Desktop version
# appears, repackages the official .deb into RPM / tarball / AppImage and
# publishes a GitHub Release. No patching, no re-signing: pure re-packaging.
on:
  schedule:
    - cron: '17 */3 * * *'   # every 3 hours
  workflow_dispatch:
    inputs:
      force:
        description: 'Build even if the version is unchanged'
        type: boolean
        default: false

permissions:
  contents: write   # create releases (no commits back to the repo)
  issues: write     # open/update an issue when the workflow fails

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.d.outputs.version }}
      should_release: ${{ steps.d.outputs.should_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: d
        env:
          FORCE: ${{ inputs.force }}
          GH_TOKEN: ${{ github.token }}
        run: |
          eval "$(bash scripts/detect-version.sh amd64)"
          # Defense in depth: version is used in shell/tag context later.
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+(\.[0-9]+)*$'; then
            echo "Refusing unexpected version string: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # State is the existence of the release itself, not a committed file:
          # that keeps the workflow read-only on the repo (no push to a
          # protected branch) and impossible to desync from what is published.
          if [ "$FORCE" != "true" ] && gh release view "v$VERSION" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists, nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will build and release v$VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    env:
      ARCH: ${{ matrix.arch }}
      APPIMAGE_EXTRACT_AND_RUN: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install build tooling
        run: sudo apt-get update && sudo apt-get install -y rpm binutils xz-utils curl zsync
      - name: Build RPM / tarball / AppImage / deb
        run: |
          bash scripts/build-rpm.sh      "$ARCH" dist
          bash scripts/build-tarball.sh  "$ARCH" dist
          bash scripts/build-appimage.sh "$ARCH" dist
          bash scripts/build-deb.sh      "$ARCH" dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.arch }}
          path: dist/*
          retention-days: 3

  release:
    needs: [detect, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Install signing tooling
        run: sudo apt-get update && sudo apt-get install -y rpm gnupg
      - name: Collect assets
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.tar.gz' -o -name '*.AppImage' -o -name '*.zsync' \) -exec cp -v {} dist/ \;
          # Ship the Quick Entry hotkey helper standalone too (handy for AppImage users).
          install -m755 extras/claude-quick-entry dist/claude-quick-entry
          ls -lh dist
      - name: Sign artifacts (RPM + SHA256SUMS)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash scripts/sign-artifacts.sh dist
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ needs.detect.outputs.version }}
        run: |
          sed -e "s/__VERSION__/$V/g" -e "s#__REPO__#$GITHUB_REPOSITORY#g" \
            packaging/release-notes.md.tmpl > NOTES.md
          gh release create "v$V" dist/* --title "Claude Desktop $V" --notes-file NOTES.md \
            || { gh release edit "v$V" --title "Claude Desktop $V" --notes-file NOTES.md; \
                 gh release upload "v$V" dist/* --clobber; }

  notify-failure:
    needs: [detect, build, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Open or update an issue with the failure log
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          # Collect the logs of the jobs that failed (each completed job's log is
          # available via the API even while this notify job is still running).
          : > failed.log
          gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            -q '.jobs[] | select(.conclusion=="failure") | "\(.id) \(.name)"' \
          | while read -r jid jname; do
              [ -z "$jid" ] && continue
              echo "===== $jname =====" >> failed.log
              gh api "repos/$REPO/actions/jobs/$jid/logs" >> failed.log 2>/dev/null \
                || echo "(log unavailable; see the run)" >> failed.log
              echo >> failed.log
            done
          tail -n 200 failed.log | sed 's/\r$//' > excerpt.log
          {
            echo "The **Repackage and release** workflow failed."
            echo
            echo "- Run: $RUN_URL"
            echo "- Commit: \`$SHA\`"
            echo
            echo "<details><summary>Failed job log (last 200 lines)</summary>"
            echo
            echo '```'
            cat excerpt.log
            echo '```'
            echo
            echo "</details>"
          } > body.md
          gh label create ci-failure -R "$REPO" --color B60205 \
            --description "Automated release workflow failure" 2>/dev/null || true
          # Reuse an open ci-failure issue if one exists (avoids one new issue per
          # 3-hourly run while upstream stays broken); otherwise open a new one.
          existing=$(gh issue list -R "$REPO" --state open --label ci-failure \
            --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" -R "$REPO" --body-file body.md
          else
            gh issue create -R "$REPO" --title "CI failure: release workflow" \
              --label ci-failure --body-file body.md
          fi

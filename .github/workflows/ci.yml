name: CI

# Validates every PR (and every push to main): applies the patches and builds all
# package formats for amd64, split across parallel jobs (mirroring release.yml's
# fetch -> build-format -> build-arch-pkg pipeline) instead of one job building
# all five formats sequentially. Only the tarball is uploaded between jobs (so
# build-arch-pkg can reuse it, same as build-arch.sh does locally); no format's
# output is kept afterwards - proving the build succeeds is the point, not
# producing artifacts (the real ones are published by release.yml).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Install fetch tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binutils xz-utils curl
      - name: Fetch + verify + patch the official .deb
        run: bash scripts/fetch-deb.sh amd64 payload
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: payload-amd64
          path: payload
          retention-days: 1   # only needed by build-format moments later

  # rpm/tarball/appimage/deb, one parallel job per format (mirrors release.yml's
  # build-format matrix), all validating against the payload fetch fetched above.
  build-format:
    needs: fetch
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: rpm
            packages: rpm
          - format: deb
            packages: dpkg binutils xz-utils
          - format: tarball
            packages: ""
          - format: appimage
            packages: curl zsync
    env:
      APPIMAGE_EXTRACT_AND_RUN: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install build tooling
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ${{ matrix.packages }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: payload-amd64
          path: payload
      - name: Build ${{ matrix.format }} (amd64) to validate patches + build script
        env:
          PAYLOAD_DIR: ${{ github.workspace }}/payload
          # CI never uploads or publishes anything (see header), so the AppImage's
          # update-info + .zsync delta file (a rolling checksum over the whole
          # ~150-200MB AppImage) would be pure wasted work here. build-appimage.sh
          # only builds that when $GITHUB_REPOSITORY is set, which the Actions
          # runner does automatically - override it empty, scoped to just this
          # step (unlike checkout/download-artifact above, which do rely on it).
          GITHUB_REPOSITORY: ''
        run: bash "scripts/build-${{ matrix.format }}.sh" amd64 dist
      # Only the tarball is needed by build-arch-pkg below; the other formats'
      # output just has to build successfully, not be kept anywhere.
      - name: Upload tarball (only format build-arch-pkg needs)
        if: matrix.format == 'tarball'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-amd64-tarball
          path: dist/*
          retention-days: 1

  # Arch .pkg.tar.zst via makepkg in an archlinux container, reusing the tarball
  # build-format already produced (same as build-arch.sh's local reuse path).
  build-arch-pkg:
    needs: build-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-amd64-tarball
          path: dist
      - name: Compute weekly cache bucket
        id: cachekey
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"
      - name: Cache pacman packages (archlinux base-devel, for build-arch.sh)
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: pacman-cache
          key: pacman-amd64-${{ steps.cachekey.outputs.week }}
      - name: Cache archlinux base image
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: archlinux-image-cache
          key: archlinux-image-amd64-${{ steps.cachekey.outputs.week }}
      - name: Load or pull the archlinux base image
        # Only the pacman *packages* installed inside the container were cached
        # before; the base image layers themselves were still pulled from Docker
        # Hub on every run. Load it from the cache above when present, else pull
        # once and save it so this week's later runs load instead of pulling.
        run: |
          mkdir -p archlinux-image-cache
          if [ -f archlinux-image-cache/archlinux.tar ]; then
            docker load -i archlinux-image-cache/archlinux.tar
            echo "build-arch: loaded archlinux:latest from cache"
          else
            docker pull archlinux:latest
            docker save archlinux:latest -o archlinux-image-cache/archlinux.tar
            echo "build-arch: pulled archlinux:latest and cached it"
          fi
      - name: Build Arch package (validates build-arch.sh, no upload)
        env:
          PACMAN_CACHE_DIR: ${{ github.workspace }}/pacman-cache
        run: bash scripts/build-arch.sh amd64 dist

  # Required-status-check gate: branch protection expects a check named "CI".
  # Splitting the format builds above means none of those jobs is individually
  # named "CI" anymore, so this job exists purely to be that gate - it only runs
  # (and succeeds) once fetch/build-format/build-arch-pkg have all succeeded.
  CI:
    name: CI
    needs: [fetch, build-format, build-arch-pkg]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All formats built OK across parallel jobs (not uploaded)."
